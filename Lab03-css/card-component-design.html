<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Component Design</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:40px;
}

/* Card Container */
.card-container{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

/* Card */
.card{
    background:white;
    width:280px;
    border-radius:10px;
    overflow:hidden;
    border:1px solid #ddd;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:transform 0.3s, box-shadow 0.3s;
}

/* Hover effect */
.card:hover{
    transform:translateY(-10px);
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* Card Image */
.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

/* Card Content */
.card-content{
    padding:20px;
}

.card-content h3{
    margin-bottom:10px;
}

.card-content p{
    font-size:14px;
    color:#555;
}

/* Button */
.card-btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 18px;
    background:#007BFF;
    color:white;
    text-decoration:none;
    border-radius:5px;
    transition:background 0.3s;
}

.card-btn:hover{
    background:#0056b3;
}

</style>
</head>

<body>

<h2 style="text-align:center;">Product Cards</h2>

<div class="card-container">

    <div class="card">
        <img src="images/icons/web-development.jpg">
        <div class="card-content">
            <h3>Web Development</h3>
            <p>Professional website development services for modern businesses.</p>
            <a href="#" class="card-btn">Learn More</a>
        </div>
    </div>

    <div class="card">
        <img src="images/icons/mobile.jpg">
        <div class="card-content">
            <h3>Mobile App Design</h3>
            <p>Design and build powerful mobile applications for Android and iOS.</p>
            <a href="#" class="card-btn">Get Started</a>
        </div>
    </div>

    <div class="card">
        <img src="images/icons/didgital.jpg">
        <div class="card-content">
            <h3>Digital Marketing</h3>
            <p>Grow your business with SEO, social media marketing, and ads.</p>
            <a href="#" class="card-btn">Explore</a>
        </div>
    </div>

</div>

</body>
</html>
