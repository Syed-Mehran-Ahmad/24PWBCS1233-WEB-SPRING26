<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced CSS Effects Showcase</title>

<style>

/* General Page Style */
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    padding:40px;
}

/* ---------------- Gradient Text ---------------- */

.gradient-text{
    font-size:50px;
    font-weight:bold;
    background: linear-gradient(45deg, red, orange, purple);
    -webkit-background-clip:text;
    -webkit-text-fill-color: transparent;
    margin-bottom:40px;
}

/* ---------------- Custom Checkbox ---------------- */

.checkbox-container{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:20px;
}

input[type="checkbox"]{
    appearance:none;
    width:22px;
    height:22px;
    border:2px solid #444;
    border-radius:4px;
    cursor:pointer;
    position:relative;
}

input[type="checkbox"]:checked{
    background:#4CAF50;
}

input[type="checkbox"]:checked::after{
    content:"✓";
    color:white;
    position:absolute;
    left:4px;
    top:-1px;
    font-size:16px;
}

/* ---------------- Custom Radio Buttons ---------------- */

input[type="radio"]{
    appearance:none;
    width:20px;
    height:20px;
    border:2px solid #555;
    border-radius:50%;
    cursor:pointer;
    position:relative;
}

input[type="radio"]:checked::after{
    content:"";
    width:10px;
    height:10px;
    background:#2196F3;
    border-radius:50%;
    position:absolute;
    top:3px;
    left:3px;
}

/* ---------------- Loading Animation ---------------- */

.loader{
    margin:40px auto;
    border:6px solid #eee;
    border-top:6px solid #3498db;
    width:50px;
    height:50px;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* ---------------- Text Clipping with Image ---------------- */

.image-text{
    font-size:70px;
    font-weight:bold;
    background:url("https://picsum.photos/800/400") center/cover;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin:50px 0;
}

/* ---------------- Complex Shadow Effects ---------------- */

.shadow-box{
    width:250px;
    margin:30px auto;
    padding:30px;
    background:white;
    border-radius:10px;
    box-shadow:
        0 4px 6px rgba(0,0,0,0.2),
        0 10px 20px rgba(0,0,0,0.15),
        0 20px 40px rgba(0,0,0,0.1);
    transition:0.4s;
}

.shadow-box:hover{
    transform:translateY(-10px);
    box-shadow:
        0 10px 20px rgba(0,0,0,0.3),
        0 20px 40px rgba(0,0,0,0.25),
        0 30px 60px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<h1 class="gradient-text">Advanced CSS Effects</h1>

<h2>Custom Checkboxes</h2>
<div class="checkbox-container">
<label><input type="checkbox"> Option 1</label>
<label><input type="checkbox"> Option 2</label>
</div>

<h2>Custom Radio Buttons</h2>
<div class="checkbox-container">
<label><input type="radio" name="gender"> Male</label>
<label><input type="radio" name="gender"> Female</label>
</div>

<h2>Loading Animation</h2>
<div class="loader"></div>

<h2>Text Clipping with Background Image</h2>
<div class="image-text">CSS MAGIC</div>

<h2>Complex Shadow Effects</h2>
<div class="shadow-box">
    Hover over this card to see shadow effect
</div>

</body>
</html>
