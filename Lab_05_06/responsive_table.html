<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Employee Directory</title>
  <link rel="stylesheet" href="styles/responsive_table.css">
</head>
<body>
  <main>
    <h1>Employee Directory</h1>

    <div class="table-wrapper">
      <table class="responsive-table" aria-label="Employee Directory">
        <thead>
          <tr>
            <th scope="col" data-sort="name">Name ▲▼</th>
            <th scope="col" data-sort="position">Position ▲▼</th>
            <th scope="col" data-sort="department">Department ▲▼</th>
            <th scope="col" data-sort="email">Email ▲▼</th>
            <th scope="col" data-sort="phone">Phone ▲▼</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td data-label="Name">Imran</td>
            <td data-label="Position">Project Manager</td>
            <td data-label="Department">Operations</td>
            <td data-label="Email">imran@example.com</td>
            <td data-label="Phone">456-7890</td>
          </tr>
          <tr>
            <td data-label="Name">Maria</td>
            <td data-label="Position">Developer</td>
            <td data-label="Department">IT</td>
            <td data-label="Email">Maria@example.com</td>
            <td data-label="Phone">654-3210</td>
          </tr>
          <tr>
            <td data-label="Name">Sara</td>
            <td data-label="Position">Designer</td>
            <td data-label="Department">Marketing</td>
            <td data-label="Email">Sara@example.com</td>
            <td data-label="Phone">123-4567</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    // Column sort functionality
    const getCellValue = (tr, idx) => tr.children[idx].innerText || tr.children[idx].textContent;

    const comparer = (idx, asc) => (a, b) => ((v1, v2) =>
      v1 !== '' && v2 !== '' && !isNaN(v1) && !isNaN(v2) 
        ? v1 - v2 
        : v1.toString().localeCompare(v2)
    )(getCellValue(asc ? a : b, idx), getCellValue(asc ? b : a, idx));

    document.querySelectorAll('th[data-sort]').forEach(th => th.addEventListener('click', (() => {
      const table = th.closest('table');
      Array.from(table.querySelectorAll('tbody > tr'))
        .sort(comparer(Array.from(th.parentNode.children).indexOf(th), this.asc = !this.asc))
        .forEach(tr => table.querySelector('tbody').appendChild(tr));
    })));
  </script>
</body>
</html>
