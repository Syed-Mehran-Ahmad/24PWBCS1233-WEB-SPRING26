<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox Navigation System</title>
  <link rel="stylesheet" href="styles/flexbox_navigation.css">
</head>
<body>

  <!-- HEADER / HORIZONTAL NAV -->
  <header class="header">
    <div class="logo">MyLogo</div>
    <nav class="main-nav">
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li class="dropdown">
          <a href="#">Services</a>
          <ul class="dropdown-menu">
            <li><a href="#">Web Design</a></li>
            <li><a href="#">SEO</a></li>
            <li><a href="#">Marketing</a></li>
          </ul>
        </li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <div class="hamburger" aria-label="Toggle navigation" role="button">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>

  <!-- VERTICAL SIDEBAR NAV -->
  <aside class="sidebar">
    <ul>
      <li><a href="#">Dashboard</a></li>
      <li><a href="#">Profile</a></li>
      <li><a href="#">Settings</a></li>
      <li><a href="#">Logout</a></li>
    </ul>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">
    <h1>Welcome to Flexbox Navigation</h1>
    <p>This is your main content area. Resize the window to see responsive behavior.</p>
  </main>

  <script>
    // Hamburger toggle for mobile nav
    const hamburger = document.querySelector('.hamburger');
    const navLinks = document.querySelector('.nav-links');

    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('open');
      hamburger.classList.toggle('active');
    });

    // Mobile dropdown toggle
    document.querySelectorAll('.dropdown > a').forEach(link => {
      link.addEventListener('click', e => {
        if(window.innerWidth <= 768){
          e.preventDefault(); // prevent navigating
          link.parentElement.classList.toggle('open');
        }
      });
    });
  </script>

</body>
</html>
