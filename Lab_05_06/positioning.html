<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 3: Positioning Challenge</title>
  <link rel="stylesheet" href="styles/positioning.css">
</head>
<body>

  <!-- Fixed Header -->
  <header class="main-header">
    <h1>Positioning Challenge</h1>
    <button id="openModal">Open Modal</button>
  </header>

  <div class="container">
    <!-- Sticky Sidebar -->
    <aside class="sidebar">
      <h2>Sidebar</h2>
      <p>Sticky element 1</p>
      <p>Sticky element 2</p>
      <p>Sticky element 3</p>
    </aside>

    <!-- Main Content -->
    <main class="content">
      <h2>Main Content</h2>
      <p>This is some sample text to demonstrate positioning and layering.</p>
      <div class="box layer1">Layer 1</div>
      <div class="box layer2">Layer 2 (on top)</div>
      <div class="box layer3">Layer 3 (topmost)</div>
    </main>
  </div>

  <!-- Absolutely Positioned Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <span id="closeModal">&times;</span>
      <h2>Modal Dialog</h2>
      <p>This modal is absolutely positioned but becomes full-screen on mobile.</p>
    </div>
  </div>

<script>
  // Modal JS
  const modal = document.getElementById('modal');
  const openBtn = document.getElementById('openModal');
  const closeBtn = document.getElementById('closeModal');

  openBtn.addEventListener('click', () => modal.style.display = 'block');
  closeBtn.addEventListener('click', () => modal.style.display = 'none');
  window.addEventListener('click', (e) => {
    if(e.target === modal) modal.style.display = 'none';
  });
</script>

</body>
</html>
