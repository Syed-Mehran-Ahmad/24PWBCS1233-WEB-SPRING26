<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopSmart - E-commerce Grid</title>
  <link rel="stylesheet" href="styles/E-commerce.css">
</head>
<body>

<header>
  <h1>ShopSmart</h1>
</header>

<div class="container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Filters</h2>
    <ul>
      <li><label><input type="checkbox"> Electronics</label></li>
      <li><label><input type="checkbox"> Clothing</label></li>
      <li><label><input type="checkbox"> Accessories</label></li>
      <li><label><input type="checkbox"> Home</label></li>
    </ul>
  </aside>

  <!-- Featured Banner -->
  <section class="banner">
    <img src="images/featured.jpeg" alt="Featured Products">
  </section>

  <!-- Main Product Grid -->
  <main class="product-grid">
    <div class="product-card">
      <img src="images/product1.jpeg" alt="Product 1">
      <h3>Product 1</h3>
      <p>$29.99</p>
      <button>Add to Cart</button>
    </div>
    <div class="product-card">
      <img src="images/product2.jpeg" alt="Product 2">
      <h3>Product 2</h3>
      <p>$49.99</p>
      <button>Add to Cart</button>
    </div>
    <div class="product-card">
      <img src="images/product3.jpeg" alt="Product 3">
      <h3>Product 3</h3>
      <p>$19.99</p>
      <button>Add to Cart</button>
    </div>
    <div class="product-card">
      <img src="images/product4.jpeg" alt="Product 4">
      <h3>Product 4</h3>
      <p>$39.99</p>
      <button>Add to Cart</button>
    </div>
    <div class="product-card">
      <img src="images/product5.jpeg" alt="Product 5">
      <h3>Product 5</h3>
      <p>$24.99</p>
      <button>Add to Cart</button>
    </div>
    <div class="product-card">
      <img src="images/product6.jpeg" alt="Product 6">
      <h3>Product 6</h3>
      <p>$59.99</p>
      <button>Add to Cart</button>
    </div>
  </main>
</div>

<!-- Mobile filter toggle -->
<button class="filter-toggle">Filters</button>

<script>
  const toggle = document.querySelector('.filter-toggle');
  const sidebar = document.querySelector('.sidebar');
  toggle.addEventListener('click', () => {
    sidebar.classList.toggle('active');
  });
</script>

</body>
</html>
