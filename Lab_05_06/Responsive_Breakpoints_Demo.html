<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Breakpoints Demo</title>
  <link rel="stylesheet" href="styles/Responsive_Breakpoints_Demo.css">
</head>
<body>
  <header class="site-header">
    <h1>Responsive Breakpoints Demo</h1>
    <p>Mobile-first design with animated SVG icons</p>
  </header>

  <main class="container">
    <section class="card-grid">
      <div class="card">
        <span class="card-icon">
          <!-- Example SVG icon -->
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#004080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12" y2="16"></line>
          </svg>
        </span>
        Card 1
      </div>
      <div class="card">
        <span class="card-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#004080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="21" x2="9" y2="9"></line>
          </svg>
        </span>
        Card 2
      </div>
      <div class="card">
        <span class="card-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#004080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 22 21 2 21 12 2"></polygon>
          </svg>
        </span>
        Card 3
      </div>
      <div class="card">
        <span class="card-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#004080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </span>
        Card 4
      </div>
      <div class="card">
        <span class="card-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#004080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        </span>
        Card 5
      </div>
      <div class="card">
        <span class="card-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#004080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5"></path>
          </svg>
        </span>
        Card 6
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Demo Layout. All rights reserved.</p>
  </footer>
</body>
</html>
